name: 每周一同步 Split Tunnels 到 Cloudflare Zero Trust
permissions:
  contents: read

on:
  schedule:
    - cron: "0 21 * * 0" # 每周一北京时间 5:00（UTC 周日 21:00）
  workflow_dispatch: # 手动触发按钮

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: pip install requests

      - name: 运行同步脚本
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROFILE_ID: ${{ secrets.CF_PROFILE_ID }}
          MODE: include # 建议配合最新脚本改为 include，或根据需要保持 exclude
        run: python sync-split.py
